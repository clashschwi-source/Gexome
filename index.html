<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gexome Heatmap</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;
const API_URL = 'https://gexome.onrender.com';

const GREEK_COLORS = {
    gex:   { pos:[0,200,160], neg:[140,0,255] },
    dex:   { pos:[20,180,255], neg:[255,80,40]  },
    vex:   { pos:[255,200,20], neg:[100,40,220] },
    charm: { pos:[40,220,120], neg:[220,60,100] },
};
const SMILE_COLORS = ['#ff4444','#ff9933','#ffdd00','#44ff88','#44ddff','#aa44ff'];

const getColor = (v,min,max,type) => {
    if(!v||v===0) return 'rgb(14,14,20)';
    const c=GREEK_COLORS[type]||GREEK_COLORS.gex;
    const aM=Math.max(Math.abs(min),Math.abs(max),0.001);
    const n=Math.pow(Math.min(Math.abs(v)/aM,1),0.6);
    const col=v>0?c.pos:c.neg;
    return `rgb(${Math.min(10+n*col[0],255)|0},${Math.min(10+n*col[1],255)|0},${Math.min(10+n*col[2],255)|0})`;
};
const fmt = v => {
    if(v==null) return '';
    const a=Math.abs(v),s=v>=0?'+':'-';
    if(a>=1000) return `${s}$${(a/1000).toFixed(1)}B`;
    if(a>=1)    return `${s}$${a.toFixed(1)}M`;
    if(a>=0.001)return `${s}$${(a*1000).toFixed(0)}K`;
    return v===0?'':s+'0';
};

const GREEKS=[
    {key:'gex',label:'GEX',title:'Gamma Exposure'},
    {key:'dex',label:'DEX',title:'Delta Exposure'},
    {key:'vex',label:'VEX',title:'Vanna Exposure'},
    {key:'charm',label:'Charm',title:'Charm (Delta Decay)'},
];

// ─── GAMMA FLIP (kumulativer GEX Zero-Crossing) ────────────────
// Professionelle Methode (SpotGamma / VannaCharm):
// GEX von lowest → highest Strike aufsummieren.
// Wo die kumulative Summe die Nulllinie kreuzt = Gamma Flip.
const findGammaFlip = (rows, S) => {
    const sorted = [...rows].sort((a, b) => a.strike - b.strike);
    if (sorted.length < 2) return null;

    let cum = 0;
    for (let i = 0; i < sorted.length - 1; i++) {
        cum += (sorted[i].gex || 0);
        const cumNext = cum + (sorted[i + 1].gex || 0);
        // Zero-Crossing: kumulative Summe wechselt Vorzeichen
        if ((cum < 0 && cumNext >= 0) || (cum >= 0 && cumNext < 0)) {
            // Gib den Strike zurück der näher an Null liegt
            return Math.abs(cum) < Math.abs(cumNext)
                ? sorted[i].strike
                : sorted[i + 1].strike;
        }
    }
    return null;
};

// ─── KEY LEVELS ────────────────────────────────────────────────
const KeyLevels = ({data, onClose}) => {
    const rows=data.data, S=data.currentPrice;
    const gammaFlip = findGammaFlip(rows, S);

    const maxCallOI=[...rows].sort((a,b)=>b.call_oi-a.call_oi)[0];
    const maxPutOI =[...rows].sort((a,b)=>b.put_oi-a.put_oi)[0];
    const top2gex  =[...rows].sort((a,b)=>Math.abs(b.gex)-Math.abs(a.gex)).slice(0,2);
    const top2vex  =[...rows].sort((a,b)=>Math.abs(b.vex)-Math.abs(a.vex)).slice(0,2);
    const top2charm=[...rows].sort((a,b)=>Math.abs(b.charm)-Math.abs(a.charm)).slice(0,2);

    const R=({label,strike,extra,color})=>(
        <div className="flex items-center justify-between py-1.5 border-b border-gray-800 last:border-0">
            <span className="text-gray-500 text-xs">{label}</span>
            <div className="flex items-center gap-2 text-right">
                <span className="font-bold text-sm" style={{color}}>${strike}</span>
                {extra&&<span className="text-xs text-gray-600">{extra}</span>}
            </div>
        </div>
    );

    return (
        <div className="fixed right-4 top-16 z-50 w-72 bg-gray-950 border border-gray-700 rounded-xl shadow-2xl p-5"
             style={{fontFamily:'monospace'}}>
            <div className="flex justify-between items-center mb-4">
                <span className="text-yellow-400 font-bold text-sm tracking-widest">⚡ KEY LEVELS</span>
                <button onClick={onClose} className="text-gray-600 hover:text-white text-xl leading-none px-1">×</button>
            </div>

            <Section title="Gamma Flip">
                {gammaFlip
                    ? <R label="GEX Nulllinie" strike={gammaFlip}
                        color={gammaFlip>S?'#ff5555':'#44ff88'}
                        extra={gammaFlip>S?'▲ über Spot':'▼ unter Spot'} />
                    : <p className="text-gray-700 text-xs py-1">Kein Flip im Bereich</p>}
            </Section>

            <Section title="OI Wände">
                <R label="Call Wall (max OI)" strike={maxCallOI?.strike} color="#44ff88" extra={maxCallOI?.call_oi?.toLocaleString()+' OI'}/>
                <R label="Put Wall (max OI)"  strike={maxPutOI?.strike}  color="#ff5555" extra={maxPutOI?.put_oi?.toLocaleString()+' OI'}/>
            </Section>

            <Section title="Stärkste GEX Level">
                {top2gex.map((r,i)=><R key={i} label={`#${i+1} ${r.gex>=0?'Long Gamma':'Short Gamma'}`}
                    strike={r.strike} color={r.gex>=0?'#0affb4':'#c014d0'} extra={fmt(r.gex)}/>)}
            </Section>

            <Section title="Stärkste VEX Level">
                {top2vex.map((r,i)=><R key={i} label={`#${i+1} Vanna`}
                    strike={r.strike} color={r.vex>=0?'#ffc814':'#6428dc'} extra={fmt(r.vex)}/>)}
            </Section>

            <Section title="Stärkste Charm Level">
                {top2charm.map((r,i)=><R key={i} label={`#${i+1} Charm`}
                    strike={r.strike} color={r.charm>=0?'#28dc78':'#dc3c64'} extra={fmt(r.charm)}/>)}
            </Section>
        </div>
    );
};

const Section = ({title,children}) => (
    <div className="mb-4">
        <div className="text-gray-600 text-xs uppercase tracking-wider mb-1.5">{title}</div>
        {children}
    </div>
);

// ─── VOL SMILE ─────────────────────────────────────────────────
const VolSmile = ({ticker}) => {
    const [sd,setSd]=useState(null), [loading,setLoading]=useState(false);
    const ref=useRef(null);

    const load=useCallback(async()=>{
        setLoading(true);
        try{ const r=await fetch(`${API_URL}/api/smile/${ticker}`); setSd(await r.json()); }
        catch(e){} finally{setLoading(false);}
    },[ticker]);

    useEffect(()=>{load();},[load]);

    useEffect(()=>{
        if(!sd||!ref.current) return;
        const cv=ref.current, ctx=cv.getContext('2d');
        const W=cv.width, H=cv.height, P={t:40,r:50,b:55,l:72};
        ctx.clearRect(0,0,W,H); ctx.fillStyle='#070910'; ctx.fillRect(0,0,W,H);
        const series=sd.series;
        if(!series?.length) return;
        const allIV=series.flatMap(s=>s.points.map(p=>p.iv));
        const allS=series.flatMap(s=>s.points.map(p=>p.strike));
        if(!allIV.length) return;

        // Y-Achse: echter IV Bereich + Puffer
        const rawMin=Math.min(...allIV), rawMax=Math.max(...allIV);
        const ivRange=Math.max(rawMax-rawMin, 1);
        const minIV=Math.max(0, rawMin - ivRange*0.15);
        const maxIV=rawMax + ivRange*0.20;

        // X-Achse: Strike-Range + 5% Padding auf jeder Seite
        const minS=Math.min(...allS), maxS=Math.max(...allS);
        const sRange=maxS-minS;
        const padS=sRange*0.05;
        const xMin=minS-padS, xMax=maxS+padS;
        const S=sd.currentPrice;
        const toX=s=>P.l+(s-xMin)/(xMax-xMin)*(W-P.l-P.r);
        const toY=iv=>H-P.b-(iv-minIV)/(maxIV-minIV)*(H-P.t-P.b);

        // Horizontale Grid-Linien
        const ivStep=parseFloat(((maxIV-minIV)/5).toPrecision(2));
        const ivStart=Math.ceil(minIV/ivStep)*ivStep;
        ctx.lineWidth=1;
        for(let iv=ivStart; iv<=maxIV+0.01; iv+=ivStep){
            const y=toY(iv);
            ctx.strokeStyle='#151c30'; ctx.beginPath(); ctx.moveTo(P.l,y); ctx.lineTo(W-P.r,y); ctx.stroke();
            ctx.fillStyle='#506080'; ctx.font='11px monospace'; ctx.textAlign='right';
            ctx.fillText(iv.toFixed(1)+'%',P.l-6,y+4);
        }
        // Vertikale Grid-Linien
        for(let i=0;i<=7;i++){
            const s=xMin+(xMax-xMin)*i/7, x=toX(s);
            ctx.strokeStyle='#151c30'; ctx.beginPath(); ctx.moveTo(x,P.t); ctx.lineTo(x,H-P.b); ctx.stroke();
            ctx.fillStyle='#506080'; ctx.font='10px monospace'; ctx.textAlign='center';
            ctx.fillText('$'+Math.round(s),x,H-P.b+18);
        }

        // Spot line
        const sx=toX(S);
        ctx.strokeStyle='rgba(255,220,0,0.7)'; ctx.lineWidth=1; ctx.setLineDash([4,4]);
        ctx.beginPath(); ctx.moveTo(sx,P.t); ctx.lineTo(sx,H-P.b); ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle='#ffdd00'; ctx.font='bold 11px monospace'; ctx.textAlign='center';
        ctx.fillText('SPOT $'+(S?.toFixed(0)),sx,H-P.b+34);

        // Series
        series.forEach((s,i)=>{
            const color=SMILE_COLORS[i%SMILE_COLORS.length];
            if(s.points.length<2) return;
            ctx.strokeStyle=color; ctx.lineWidth=2.5;
            ctx.beginPath();
            s.points.forEach((p,j)=>{ const x=toX(p.strike),y=toY(p.iv); j===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
            ctx.stroke();
            ctx.fillStyle=color;
            s.points.forEach(p=>{ ctx.beginPath(); ctx.arc(toX(p.strike),toY(p.iv),3,0,Math.PI*2); ctx.fill(); });
        });

        ctx.fillStyle='#606880'; ctx.font='bold 12px monospace'; ctx.textAlign='left';
        ctx.fillText(sd.ticker+' · Volatility Smile · 0-5 DTE',P.l,22);
    },[sd]);

    return (
        <div className="mx-6 mb-8 mt-6 bg-gray-950 border border-gray-800 rounded-xl p-5">
            <div className="flex justify-between items-center mb-4">
                <span className="text-cyan-400 font-bold text-sm tracking-widest" style={{fontFamily:'monospace'}}>
                    📈 VOLATILITY SMILE / SKEW
                </span>
                <button onClick={load} disabled={loading}
                    className="text-xs bg-gray-800 hover:bg-gray-700 px-3 py-1 rounded text-gray-400 disabled:opacity-40">
                    {loading?'⏳':'🔄'} Refresh
                </button>
            </div>
            {loading&&!sd&&<div className="text-center text-gray-600 py-10">⏳ Lade Vol Smile…</div>}
            {sd&&<>
                <canvas ref={ref} width={920} height={340} className="w-full rounded-lg"/>
                <div className="flex flex-wrap gap-5 mt-3">
                    {sd.series.map((s,i)=>(
                        <div key={i} className="flex items-center gap-2 text-xs" style={{fontFamily:'monospace'}}>
                            <div style={{width:18,height:3,backgroundColor:SMILE_COLORS[i%SMILE_COLORS.length],borderRadius:2}}/>
                            <span style={{color:SMILE_COLORS[i%SMILE_COLORS.length]}}>{s.label}</span>
                            <span className="text-gray-700">{s.expDate}</span>
                        </div>
                    ))}
                </div>
            </>}
        </div>
    );
};

// ─── APP ───────────────────────────────────────────────────────
const App = () => {
    const [ticker,setTicker]=useState('QQQ'), [input,setInput]=useState('QQQ');
    const [dte,setDte]=useState(0), [strikes,setStrikes]=useState(30);
    const [loading,setLoading]=useState(false), [error,setError]=useState(null);
    const [data,setData]=useState(null), [showKL,setShowKL]=useState(false);

    const load=useCallback(async(tkr,d)=>{
        setLoading(true); setError(null);
        try{
            const r=await fetch(`${API_URL}/api/options/${tkr}?strikes=${strikes}&dte=${d}`);
            if(!r.ok){const e=await r.json(); throw new Error(e.error||'Fehler');}
            const j=await r.json(); setData(j);
            if(j.selectedDte!==d) setDte(j.selectedDte);
        }catch(e){setError(e.message);}
        finally{setLoading(false);}
    },[strikes]);

    useEffect(()=>{
        load(ticker,dte);
        const iv=setInterval(()=>load(ticker,dte),60000);
        return()=>clearInterval(iv);
    },[ticker,dte,load]);

    const ranges={};
    if(data) GREEKS.forEach(({key})=>{
        const v=data.data.map(r=>r[key]).filter(v=>v!==0&&v!=null);
        ranges[key]={min:v.length?Math.min(...v):-1,max:v.length?Math.max(...v):1};
    });
    const S=data?.currentPrice;
    const closest=data?data.data.reduce((p,c)=>Math.abs(c.strike-S)<Math.abs(p.strike-S)?c:p):null;

    return (
        <div className="bg-black text-white min-h-screen" style={{fontFamily:'monospace'}}>

            <div className="sticky top-0 z-40 px-6 py-3 border-b border-gray-800 bg-gray-950">
                <div className="flex items-center flex-wrap gap-3 justify-between">
                    <h1 className="text-2xl font-bold tracking-widest">GEXOME</h1>

                    <form onSubmit={e=>{e.preventDefault();const t=input.trim().toUpperCase();if(t)setTicker(t)}}
                        className="flex items-center gap-2">
                        <input value={input} onChange={e=>setInput(e.target.value.toUpperCase())}
                            className="bg-black border border-gray-600 rounded px-3 py-1.5 w-24 text-sm uppercase text-white" placeholder="Ticker"/>
                        <button type="submit" className="bg-green-700 hover:bg-green-600 px-3 py-1.5 rounded text-sm">Laden</button>
                    </form>

                    <div className="flex items-center gap-2">
                        <span className="text-gray-400 text-sm">DTE:</span>
                        {(data?.availableDtes||[0,1,2,3,4]).map(d=>(
                            <button key={d} onClick={()=>setDte(d)}
                                className={`px-3 py-1.5 rounded text-sm font-bold ${dte===d?'bg-cyan-600 text-white':'bg-gray-800 text-gray-400 hover:bg-gray-700'}`}>
                                {d}DTE</button>
                        ))}
                    </div>

                    <select value={strikes} onChange={e=>setStrikes(Number(e.target.value))}
                        className="bg-black border border-gray-600 rounded px-2 py-1.5 text-sm text-white">
                        {[30,50,80,100].map(n=><option key={n} value={n}>{n} Strikes</option>)}
                    </select>

                    <div className="flex gap-2">
                        <button onClick={()=>setShowKL(v=>!v)}
                            className={`px-4 py-1.5 rounded text-sm font-bold border transition-all ${showKL?'bg-yellow-500 border-yellow-400 text-black':'border-yellow-600 text-yellow-400 hover:bg-yellow-600 hover:text-black'}`}>
                            ⚡ Key Levels
                        </button>
                        <button onClick={()=>load(ticker,dte)} disabled={loading}
                            className="bg-blue-700 hover:bg-blue-600 disabled:opacity-40 px-3 py-1.5 rounded text-sm">
                            {loading?'⏳':'🔄'}
                        </button>
                    </div>
                </div>
                {data&&<div className="flex gap-5 mt-1.5 text-xs text-gray-500 flex-wrap items-center">
                    <span className="text-white font-bold">{data.ticker} ${data.currentPrice?.toFixed(2)}</span>
                    <span>Expiry: <span className="text-cyan-400">{data.expDate} ({data.selectedDte}DTE)</span></span>
                    <span>{new Date(data.timestamp).toLocaleTimeString('de-DE')}</span>
                    <span className="text-yellow-600">⏱ 60s</span>
                    {error&&<span className="text-red-400">⚠️ {error}</span>}
                    {/* REGIME INDICATOR */}
                    {data&&(
                        <div className="ml-auto flex items-center gap-2 px-4 py-1 rounded-full border"
                            style={{backgroundColor:'rgba(80,80,100,0.15)', borderColor:'rgba(120,120,160,0.4)'}}>
                            <div className="w-2 h-2 rounded-full bg-gray-500"/>
                            <span className="font-bold tracking-wider text-xs text-gray-400">
                                ◆ REGIME UNKNOWN
                            </span>
                            <span className="text-gray-600">better API needed</span>
                        </div>
                    )}
                </div>}
            </div>

            {showKL&&data&&<KeyLevels data={data} onClose={()=>setShowKL(false)}/>}

            {loading&&!data&&<div className="flex justify-center items-center h-64 text-gray-600">
                <div className="text-center"><div className="text-4xl mb-3">⏳</div>Lade Daten…</div>
            </div>}

            {data&&<>
                <div className="overflow-x-auto">
                    <table className="border-collapse text-sm w-full">
                        <thead className="sticky top-[57px] z-20">
                            <tr>
                                <th className="sticky left-0 z-30 bg-gray-900 border-r border-gray-700 px-3 py-2 text-left text-gray-400 w-16">Strike</th>
                                {GREEKS.map(({key,label,title})=>(
                                    <th key={key} className="bg-gray-900 border-r border-gray-800 px-3 py-2 text-center" title={title}>
                                        <span style={{color:`rgb(${GREEK_COLORS[key].pos.join(',')})`}}>{label}</span>
                                        <div className="text-gray-600 text-xs font-normal">{title}</div>
                                    </th>
                                ))}
                                <th className="bg-gray-900 border-r border-gray-800 px-2 py-2 text-center text-gray-500 text-xs">Mid IV</th>
                                <th className="bg-gray-900 border-r border-gray-800 px-2 py-2 text-center text-gray-500 text-xs">Call OI</th>
                                <th className="bg-gray-900 px-2 py-2 text-center text-gray-500 text-xs">Put OI</th>
                            </tr>
                        </thead>
                        <tbody>
                            {data.data.map((row,i)=>{
                                const iC=closest&&row.strike===closest.strike;
                                return <tr key={i} className={iC?'outline outline-2 outline-yellow-400':'border-t border-gray-900'}>
                                    <td className={`sticky left-0 z-10 px-3 py-1 text-right border-r border-gray-800 ${iC?'bg-yellow-900 text-yellow-300 font-bold':'bg-black text-gray-300'}`}>
                                        {row.strike}
                                    </td>
                                    {GREEKS.map(({key})=>{
                                        const v=row[key];
                                        const {min,max}=ranges[key]||{min:-1,max:1};
                                        return <td key={key} className="px-2 py-1 text-center border-r border-gray-900"
                                            style={{backgroundColor:getColor(v,min,max,key)}} title={`${key}: ${v}`}>
                                            {fmt(v)}
                                        </td>;
                                    })}
                                    <td className="px-2 py-1 text-center text-gray-600 border-r border-gray-900">
                                        {row.mid_iv?(row.mid_iv*100).toFixed(1)+'%':''}
                                    </td>
                                    <td className="px-2 py-1 text-center text-green-800 border-r border-gray-900">{row.call_oi?.toLocaleString()}</td>
                                    <td className="px-2 py-1 text-center text-purple-800">{row.put_oi?.toLocaleString()}</td>
                                </tr>;
                            })}
                        </tbody>
                    </table>
                </div>
                <VolSmile ticker={ticker}/>
            </>}

            <div className="border-t border-gray-800 bg-gray-950 px-6 py-2 flex items-center gap-5 text-xs text-gray-600 flex-wrap">
                {GREEKS.map(({key,label,title})=>(
                    <div key={key} className="flex items-center gap-1.5">
                        <div className="w-3 h-3 rounded" style={{backgroundColor:`rgb(${GREEK_COLORS[key].pos.join(',')})`}}/>
                        <div className="w-3 h-3 rounded" style={{backgroundColor:`rgb(${GREEK_COLORS[key].neg.join(',')})`}}/>
                        <span>{label}={title}</span>
                    </div>
                ))}
                <span className="ml-auto">Yahoo Finance · 15-20min delay</span>
            </div>
        </div>
    );
};
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

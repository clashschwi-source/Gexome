<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gexome Heatmap - Live Data</title>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        const API_URL = 'https://gexome.onrender.com';

        // Farben für jeden Greek-Typ
        const GREEK_COLORS = {
            gex:   { pos: [10, 255, 180],  neg: [160, 20, 200] },
            dex:   { pos: [20, 180, 255],  neg: [255, 80,  40] },
            vex:   { pos: [255, 200,  20], neg: [100, 40, 220] },
            charm: { pos: [40, 220, 120],  neg: [220, 60, 100] },
        };

        const getColor = (value, min, max, type) => {
            if (value === undefined || value === null || value === 0) return 'rgb(14,14,20)';
            const colors = GREEK_COLORS[type] || GREEK_COLORS.gex;
            const absMax = Math.max(Math.abs(min), Math.abs(max), 0.001);
            const normalized = Math.pow(Math.min(Math.abs(value) / absMax, 1), 0.6);
            const c = value > 0 ? colors.pos : colors.neg;
            const r = Math.round(10 + normalized * c[0]);
            const g = Math.round(10 + normalized * c[1]);
            const b = Math.round(10 + normalized * c[2]);
            return `rgb(${Math.min(r,255)},${Math.min(g,255)},${Math.min(b,255)})`;
        };

        const fmt = (value) => {
            if (value === undefined || value === null) return '';
            const abs = Math.abs(value);
            const sign = value >= 0 ? '+' : '-';
            if (abs >= 1000) return `${sign}$${(abs/1000).toFixed(1)}B`;
            if (abs >= 1)    return `${sign}$${abs.toFixed(1)}M`;
            if (abs >= 0.001) return `${sign}$${(abs*1000).toFixed(0)}K`;
            return value === 0 ? '' : `${sign}0`;
        };

        // Datum korrekt anzeigen ohne Timezone-Verschiebung
        const fmtDate = (dateStr) => {
            const [y, m, d] = dateStr.split('-');
            return `${d}.${m}`;
        };

        const GREEKS = [
            { key: 'gex',   label: 'GEX',   title: 'Gamma Exposure' },
            { key: 'dex',   label: 'DEX',   title: 'Delta Exposure' },
            { key: 'vex',   label: 'VEX',   title: 'Vanna Exposure' },
            { key: 'charm', label: 'Charm', title: 'Charm (Delta Decay)' },
        ];

        const OptionsHeatmap = () => {
            const [ticker, setTicker]           = useState('QQQ');
            const [inputTicker, setInputTicker] = useState('QQQ');
            const [selectedDte, setSelectedDte] = useState(0);
            const [strikes, setStrikes]         = useState(50);
            const [loading, setLoading]         = useState(false);
            const [error, setError]             = useState(null);
            const [data, setData]               = useState(null);

            const loadData = useCallback(async (tkr, dte) => {
                setLoading(true);
                setError(null);
                try {
                    const res = await fetch(`${API_URL}/api/options/${tkr}?strikes=${strikes}&dte=${dte}`);
                    if (!res.ok) {
                        const err = await res.json();
                        throw new Error(err.error || 'Backend Fehler');
                    }
                    const json = await res.json();
                    setData(json);
                    // Falls gewähltes DTE nicht verfügbar war, aktualisieren
                    if (json.selectedDte !== dte) setSelectedDte(json.selectedDte);
                } catch (e) {
                    setError(e.message);
                } finally {
                    setLoading(false);
                }
            }, [strikes]);

            useEffect(() => {
                loadData(ticker, selectedDte);
                const iv = setInterval(() => loadData(ticker, selectedDte), 60000);
                return () => clearInterval(iv);
            }, [ticker, selectedDte, loadData]);

            const handleTickerSubmit = (e) => {
                e.preventDefault();
                const t = inputTicker.trim().toUpperCase();
                if (t) { setTicker(t); }
            };

            // Min/Max pro Greek
            const ranges = {};
            if (data) {
                GREEKS.forEach(({ key }) => {
                    const vals = data.data.map(r => r[key]).filter(v => v !== 0 && v !== undefined);
                    ranges[key] = {
                        min: vals.length ? Math.min(...vals) : -1,
                        max: vals.length ? Math.max(...vals) :  1,
                    };
                });
            }

            const currentPrice = data?.currentPrice;
            const closestStrike = data ? data.data.reduce((prev, curr) =>
                Math.abs(curr.strike - currentPrice) < Math.abs(prev.strike - currentPrice) ? curr : prev
            ) : null;

            return (
                <div className="h-screen bg-black text-white flex flex-col overflow-hidden" style={{fontFamily:'monospace'}}>

                    {/* ── HEADER ── */}
                    <div className="flex-none px-6 py-3 border-b border-gray-800 bg-gray-950">
                        <div className="flex items-center justify-between flex-wrap gap-3">
                            <h1 className="text-2xl font-bold tracking-widest text-white">GEXOME</h1>

                            {/* Ticker */}
                            <form onSubmit={handleTickerSubmit} className="flex items-center gap-2">
                                <input
                                    type="text"
                                    value={inputTicker}
                                    onChange={e => setInputTicker(e.target.value.toUpperCase())}
                                    className="bg-black border border-gray-600 rounded px-3 py-1.5 w-24 text-white text-sm uppercase"
                                    placeholder="Ticker"
                                />
                                <button type="submit" className="bg-green-700 hover:bg-green-600 px-3 py-1.5 rounded text-sm">
                                    Laden
                                </button>
                            </form>

                            {/* DTE Selector */}
                            <div className="flex items-center gap-2">
                                <span className="text-gray-400 text-sm">DTE:</span>
                                <div className="flex gap-1">
                                    {(data?.availableDtes || [0,1,2,3,4]).map(dte => (
                                        <button
                                            key={dte}
                                            onClick={() => setSelectedDte(dte)}
                                            className={`px-3 py-1.5 rounded text-sm font-bold transition-all ${
                                                selectedDte === dte
                                                    ? 'bg-cyan-600 text-white'
                                                    : 'bg-gray-800 text-gray-400 hover:bg-gray-700'
                                            }`}
                                        >
                                            {dte}DTE
                                        </button>
                                    ))}
                                </div>
                            </div>

                            {/* Strikes */}
                            <div className="flex items-center gap-2">
                                <span className="text-gray-400 text-sm">Strikes:</span>
                                <select
                                    value={strikes}
                                    onChange={e => setStrikes(Number(e.target.value))}
                                    className="bg-black border border-gray-600 rounded px-2 py-1.5 text-sm text-white"
                                >
                                    {[30, 50, 80, 100].map(n => (
                                        <option key={n} value={n}>{n}</option>
                                    ))}
                                </select>
                            </div>

                            {/* Refresh */}
                            <button
                                onClick={() => loadData(ticker, selectedDte)}
                                disabled={loading}
                                className="bg-blue-700 hover:bg-blue-600 disabled:opacity-40 px-3 py-1.5 rounded text-sm"
                            >
                                {loading ? '⏳' : '🔄'} Refresh
                            </button>
                        </div>

                        {/* Status Bar */}
                        {data && (
                            <div className="flex items-center gap-6 mt-2 text-xs text-gray-500">
                                <span className="text-white font-bold text-base">{data.ticker} ${data.currentPrice?.toFixed(2)}</span>
                                <span>Expiry: <span className="text-cyan-400">{data.expDate} ({data.selectedDte}DTE)</span></span>
                                <span>Update: {new Date(data.timestamp).toLocaleTimeString('de-DE')}</span>
                                <span className="text-yellow-500">⏱ Auto-Refresh 60s</span>
                                {error && <span className="text-red-400">⚠️ {error}</span>}
                            </div>
                        )}
                        {!data && error && (
                            <div className="mt-2 text-red-400 text-sm">❌ {error}</div>
                        )}
                    </div>

                    {/* ── LOADING ── */}
                    {loading && !data && (
                        <div className="flex-1 flex items-center justify-center text-gray-400">
                            <div className="text-center">
                                <div className="text-3xl mb-3">⏳</div>
                                <div>Lade Live-Daten von Yahoo Finance...</div>
                                <div className="text-xs mt-1 text-gray-600">Kann 10-20s dauern (Free Tier)</div>
                            </div>
                        </div>
                    )}

                    {/* ── TABLE ── */}
                    {data && (
                        <div className="flex-1 overflow-auto">
                            <table className="border-collapse text-xs" style={{minWidth:'600px', width:'100%'}}>
                                <thead className="sticky top-0 z-20">
                                    <tr>
                                        {/* Strike header */}
                                        <th className="sticky left-0 z-30 bg-gray-900 border-r border-gray-700 px-3 py-2 text-left text-gray-400 w-16">
                                            Strike
                                        </th>
                                        {/* Greek headers */}
                                        {GREEKS.map(({ key, label, title }) => (
                                            <th key={key} className="bg-gray-900 border-r border-gray-800 px-3 py-2 text-center" title={title}>
                                                <span style={{color: `rgb(${GREEK_COLORS[key].pos.join(',')})`}}>{label}</span>
                                                <div className="text-gray-600 font-normal text-xs">{title}</div>
                                            </th>
                                        ))}
                                        {/* OI */}
                                        <th className="bg-gray-900 border-r border-gray-800 px-3 py-2 text-center text-gray-400">
                                            Call OI
                                        </th>
                                        <th className="bg-gray-900 px-3 py-2 text-center text-gray-400">
                                            Put OI
                                        </th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {data.data.map((row, idx) => {
                                        const isCurrent = closestStrike && row.strike === closestStrike.strike;
                                        return (
                                            <tr
                                                key={idx}
                                                className={isCurrent ? 'outline outline-2 outline-yellow-400' : 'border-t border-gray-900'}
                                            >
                                                {/* Strike */}
                                                <td className={`sticky left-0 z-10 px-3 py-1 text-right border-r border-gray-800 ${
                                                    isCurrent
                                                        ? 'bg-yellow-900 text-yellow-300 font-bold'
                                                        : 'bg-black text-gray-300'
                                                }`}>
                                                    {row.strike}
                                                </td>

                                                {/* Greek cells */}
                                                {GREEKS.map(({ key }) => {
                                                    const val = row[key];
                                                    const { min, max } = ranges[key] || { min: -1, max: 1 };
                                                    return (
                                                        <td
                                                            key={key}
                                                            className="px-2 py-1 text-center border-r border-gray-900 font-mono"
                                                            style={{ backgroundColor: getColor(val, min, max, key) }}
                                                            title={`${key.toUpperCase()}: ${val}`}
                                                        >
                                                            {fmt(val)}
                                                        </td>
                                                    );
                                                })}

                                                {/* OI */}
                                                <td className="px-2 py-1 text-center text-green-700 border-r border-gray-900">
                                                    {row.call_oi?.toLocaleString()}
                                                </td>
                                                <td className="px-2 py-1 text-center text-purple-700">
                                                    {row.put_oi?.toLocaleString()}
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    )}

                    {/* ── LEGEND ── */}
                    <div className="flex-none border-t border-gray-800 bg-gray-950 px-6 py-2 flex items-center gap-8 text-xs text-gray-500 flex-wrap">
                        {GREEKS.map(({ key, label, title }) => (
                            <div key={key} className="flex items-center gap-2">
                                <div className="flex gap-1">
                                    <div className="w-4 h-4 rounded" style={{backgroundColor:`rgb(${GREEK_COLORS[key].pos.join(',')})`}}></div>
                                    <div className="w-4 h-4 rounded" style={{backgroundColor:`rgb(${GREEK_COLORS[key].neg.join(',')})`}}></div>
                                </div>
                                <span>{label} = {title}</span>
                            </div>
                        ))}
                        <span className="ml-auto">made by @bent124 & @optionsthe | Yahoo Finance (15-20min delay)</span>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<OptionsHeatmap />);
    </script>
</body>
</html>
